services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aiagent_api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Персистентные данные — хранятся между перезапусками
      - chroma_data:/app/data/chroma
      - sqlite_data:/app/data/sqlite
      # Документы для индексации — проброс из хоста
      - ./data/documents:/app/data/documents
      # Credentials Google (read-only для безопасности)
      - ./credentials:/app/credentials:ro
      # Логи
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  # Chroma vector store — индексы документов
  chroma_data:
    driver: local

  # SQLite — персистентная память диалогов LangGraph
  sqlite_data:
    driver: local
